name: Update Articles & DOCX

on:
  schedule:
    - cron: '30 0 * * *'  # 6:00 AM IST (00:30 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install docx package
        run: npm install docx

      - name: Install Python dependencies
        run: pip install playwright

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run CI updater
        run: python3 scripts/ci_update.py --headless

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet HEAD; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated data
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "Auto Update Bot"
          git config user.email "bot@example.com"
          git add -f public/data/
          git add -f image_map.json
          git add -f urls.json
          git add -f new_urls.json
          git commit -m "Auto-update: $(date +%Y-%m-%d)" || true
          git push

      - name: Create release with DOCX
        if: steps.check.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v1.0.${{ github.run_number }}" \
            --title "Marketing Cloud Next DOCX v1.0.${{ github.run_number }}" \
            --notes "Auto-generated DOCX with all articles from @marketingcloudtips" \
            "Marketing_Cloud_Next_Public.docx"
